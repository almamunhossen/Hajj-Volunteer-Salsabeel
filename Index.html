<!DOCTYPE html>
<html lang="en">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hajj Volunteer Salsabeel 2026</title>
    <!-- Bulma CSS + Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-emerald: #046A38;
            --primary-dark: #024725;
            --accent-gold: #D4AF37;
            --bg-light: #F4F7F6;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --card-bg: rgba(255, 255, 255, 0.95);
            --border-color: #E2E8F0;
            --focus-ring: rgba(4, 106, 56, 0.2);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            background-image:
                radial-gradient(circle at 100% 0%, rgba(4, 106, 56, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
            color: var(--text-dark);
        }

        /* Hero Section Enhancements */
        .hero.is-primary.is-bold {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-emerald) 100%);
            color: white;
            padding-top: 4rem;
            padding-bottom: 6rem;
            position: relative;
            overflow: hidden;
        }

        /* Subtle Islamic pattern overlay on hero */
        .hero.is-primary.is-bold::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.6;
            pointer-events: none;
        }

        .hero .title {
            color: white;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .hero .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 0.02em;
            margin-top: 0.5rem;
        }

        .hero-logo {
            max-width: 80px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 0.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .hero-logo:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .hero-logo img {
            width: 56px;
            height: 56px;
            object-fit: contain;
        }

        /* Form Card */
        .card-form {
            position: relative;
            border-radius: 24px;
            background: var(--card-bg);
            padding: 3rem;
            box-shadow: var(--shadow-lg);
            margin-top: -5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        .label {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .required-star::after {
            content: ' *';
            color: #ef4444;
        }

        /* Inputs & Selects */
        .input,
        .textarea,
        .select select,
        .file-label {
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: #FAFAFA;
            color: var(--text-dark);
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .input,
        .select select {
            height: 3.2rem;
        }

        .input:hover,
        .textarea:hover,
        .select select:hover {
            border-color: #CBD5E1;
            background-color: #fff;
        }

        .input:focus,
        .textarea:focus,
        .select select:focus,
        .file-input:focus-visible+.file-label {
            border-color: var(--primary-emerald);
            box-shadow: 0 0 0 4px var(--focus-ring);
            background-color: #fff;
        }

        /* Icons inside inputs */
        .control.has-icons-left .icon {
            color: var(--text-muted);
            height: 3.2rem;
            width: 3.2rem;
            transition: color 0.3s ease;
        }

        .control.has-icons-left .input:focus~.icon,
        .control.has-icons-left .textarea:focus~.icon,
        .control.has-icons-left select:focus~.icon {
            color: var(--primary-emerald);
        }

        .select select {
            padding-left: 3.2rem;
        }

        .select:not(.is-multiple):not(.is-loading)::after {
            border-color: var(--text-muted);
        }

        .select:hover::after {
            border-color: var(--text-dark);
        }

        /* File Upload Styling */
        .file.has-name .file-label {
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            background: #FAFAFA;
        }

        .file-cta {
            background-color: var(--bg-light);
            border: none;
            border-right: 1px solid var(--border-color);
            color: var(--text-dark);
            font-weight: 500;
            transition: background-color 0.2s;
            padding: 1rem 1.5rem;
        }

        .file-name {
            border: none;
            font-size: 0.95rem;
            color: var(--text-muted);
            padding: 1rem 1.5rem;
            flex-grow: 1;
        }

        .file-label:hover .file-cta {
            background-color: #E2E8F0;
        }

        .preview-container {
            margin-top: 1rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
            background: #FAFAFA;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px dashed var(--border-color);
        }

        #previewImg {
            border-radius: 8px;
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
            box-shadow: var(--shadow-sm);
        }

        .help {
            margin-top: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .help.is-danger {
            color: #ef4444;
            font-weight: 500;
        }

        /* Buttons */
        .button {
            height: 3.2rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .button.is-primary {
            border-radius: 12px;
            min-width: 180px;
            background-color: var(--primary-emerald);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(4, 106, 56, 0.39);
        }

        .button.is-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(4, 106, 56, 0.23);
            background-color: var(--primary-dark);
        }

        .button.is-primary.is-loading::after {
            border-color: transparent transparent #fff #fff !important;
        }

        .button.is-light {
            border-radius: 12px;
            background-color: #F1F5F9;
            color: var(--text-dark);
        }

        .button.is-light:hover {
            background-color: #E2E8F0;
            transform: translateY(-2px);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }

        .toast {
            min-width: 300px;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            background: white;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 1rem;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 500;
            pointer-events: auto;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left: 4px solid var(--primary-emerald);
            color: var(--primary-dark);
        }

        .toast.error {
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }

        .toast.info {
            border-left: 4px solid #3b82f6;
            color: #1e3a8a;
        }

        .toast-icon {
            font-size: 1.25rem;
        }

        .toast.success .toast-icon {
            color: var(--primary-emerald);
        }

        .toast.error .toast-icon {
            color: #ef4444;
        }

        .toast.info .toast-icon {
            color: #3b82f6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .hero.is-primary.is-bold {
                padding-top: 3rem;
                padding-bottom: 5rem;
            }

            .card-form {
                padding: 2rem 1.5rem;
                margin-top: -3rem;
                border-radius: 20px;
            }

            .field.is-grouped {
                flex-direction: column;
            }

            .field.is-grouped .control {
                width: 100%;
                margin-bottom: 0.75rem;
            }

            .button {
                width: 100%;
            }

            .toast-container {
                left: 1rem;
                right: 1rem;
                bottom: 1rem;
            }

            .toast {
                min-width: 0;
                width: 100%;
            }
        }

        /* Footer Styling */
        .footer-pro {
            background-color: var(--primary-dark);
            color: rgba(255, 255, 255, 0.8);
            padding: 3rem 1.5rem;
            margin-top: 4rem;
            position: relative;
            border-top: 4px solid var(--accent-gold);
        }

        .footer-pro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.8;
            pointer-events: none;
        }

        .footer-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 0.75rem;
        }

        .footer-pro p {
            margin: 0;
            font-size: 0.95rem;
        }

        .footer-pro a {
            color: var(--accent-gold);
            font-weight: 500;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-pro a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .footer-heart {
            color: #ef4444;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>
    <section class="hero is-primary is-bold">
        <div class="hero-body">
            <div class="container has-text-centered-mobile">
                <div class="hero-logo">
                    <img src="https://drive.google.com/uc?export=view&id=1LogEMH-IfbeX7jL6mTlwKmX07Hz-Wp7o"
                        alt="Volunteer logo" onerror="this.style.display='none'">
                </div>
                <h1 class="title is-2">Volunteer Registration</h1>
                <p class="subtitle is-5">Hajj Volunteer Salsabeel 2026</p>
            </div>
        </div>
    </section>

    <div class="container mb-6">
        <div class="card-form">
            <form id="volunteerForm" novalidate>
                <div class="columns is-multiline">
                    <!-- Full name -->
                    <div class="column is-6 field">
                        <label class="label required-star">Full Name</label>
                        <div class="control has-icons-left">
                            <input class="input" type="text" name="fullName" placeholder="e.g., Al Mamun Hossen"
                                required autocomplete="name">
                            <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
                        </div>
                    </div>

                    <!-- ID number -->
                    <div class="column is-6 field">
                        <label class="label required-star">ID Number</label>
                        <div class="control has-icons-left">
                            <input class="input" type="text" name="idNumber" placeholder="National ID / Passport"
                                required>
                            <span class="icon is-small is-left"><i class="fas fa-id-card"></i></span>
                        </div>
                    </div>

                    <!-- Mobile -->
                    <div class="column is-6 field">
                        <label class="label required-star">Mobile Number</label>
                        <div class="control has-icons-left">
                            <input class="input" type="tel" name="mobile" placeholder="+966 5X XXX XXXX" required
                                pattern="[+0-9\s\-\(\)]{8,20}" title="Valid phone number">
                            <span class="icon is-small is-left"><i class="fas fa-phone"></i></span>
                        </div>
                        <p class="help">Include country code</p>
                    </div>

                    <!-- Blood group -->
                    <div class="column is-6 field">
                        <label class="label required-star">Blood Group</label>
                        <div class="control has-icons-left">
                            <div class="select is-fullwidth">
                                <select name="bloodGroup" required>
                                    <option value="" disabled selected>– Select blood type –</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                </select>
                            </div>
                            <span class="icon is-small is-left"><i class="fas fa-tint"></i></span>
                        </div>
                    </div>
                </div>

                <!-- Profile photo (optional) -->
                <div class="field mt-2">
                    <label class="label">Profile Photo</label>
                    <div class="control">
                        <div class="file has-name is-fullwidth">
                            <label class="file-label">
                                <input class="file-input" type="file" name="theFile" id="profilePhoto"
                                    accept="image/jpeg, image/png, image/jpg, image/webp" required>
                                <span class="file-cta">
                                    <span class="file-icon"><i class="fas fa-camera"></i></span>
                                    <span class="file-label">Choose a photo…</span>
                                </span>
                                <span class="file-name" id="fileNameDisplay">No file selected</span>
                            </label>
                        </div>
                    </div>
                    <div id="previewArea" class="preview-container" style="display: none;">
                        <img id="previewImg" class="image-preview" alt="Preview">
                        <div>
                            <p class="is-size-7 has-text-weight-semibold mb-2" id="previewName">filename.jpg</p>
                            <button type="button" id="clearPhotoBtn" class="button is-small is-light"><i
                                    class="fas fa-times mr-1"></i> Remove</button>
                        </div>
                    </div>
                    <p class="help">JPEG, PNG, WEBP (max 5MB)</p>
                </div>

                <!-- Additional information -->
                <div class="field mt-4">
                    <label class="label">Additional Information <span
                            class="has-text-grey-light">(Optional)</span></label>
                    <div class="control has-icons-left">
                        <textarea class="textarea" name="additionalInfo" rows="3"
                            placeholder="Medical conditions, availability, previous donation experience..."
                            style="padding-left: 3.2rem;"></textarea>
                        <span class="icon is-small is-left"
                            style="height: 3.2rem; display: flex; align-items: center; justify-content: center;"><i
                                class="fas fa-comment-dots"></i></span>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="field is-grouped is-grouped-right mt-6 pt-4"
                    style="border-top: 1px solid var(--border-color);">
                    <div class="control">
                        <button class="button is-light" type="button" id="cancelBtn">
                            <span class="icon"><i class="fas fa-undo-alt"></i></span>
                            <span>Clear</span>
                        </button>
                    </div>
                    <div class="control">
                        <button class="button is-primary" type="submit" id="submitBtn">
                            <span class="icon"><i class="fas fa-paper-plane"></i></span>
                            <span>Register Now</span>
                        </button>
                    </div>
                </div>
            </form>
            <p class="help is-danger mt-4 has-text-centered">* Required fields must be completed before submitting.</p>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
        // ======================  IMPORTANT  ======================
        // REPLACE THIS URL WITH YOUR DEPLOYED APPS SCRIPT WEB APP URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbw6wDo6n8xsHBuQxUs6B2ceLsY5lx-o9jWdvgS2AVmPv0nXOW7tLD87UagDExecRDo6BQ/exec";
        // ========================================================

        (function () {
            const form = document.getElementById('volunteerForm');
            const submitBtn = document.getElementById('submitBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const fileInput = document.getElementById('profilePhoto');
            const fileNameSpan = document.getElementById('fileNameDisplay');
            const previewArea = document.getElementById('previewArea');
            const previewImg = document.getElementById('previewImg');
            const previewName = document.getElementById('previewName');
            const clearPhotoBtn = document.getElementById('clearPhotoBtn');

            function showToast(text, type = 'info') {
                const toastContainer = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;

                let iconClass = 'fa-info-circle';
                if (type === 'success') iconClass = 'fa-check-circle';
                if (type === 'error') iconClass = 'fa-exclamation-circle';

                toast.innerHTML = `
                    <i class="fas ${iconClass} toast-icon"></i>
                    <div>${text}</div>
                `;

                toastContainer.appendChild(toast);

                // Trigger animation
                setTimeout(() => toast.classList.add('show'), 10);

                // Remove after 5 seconds
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 400); // Wait for transition
                }, 5000);
            }

            function resetFilePreview() {
                fileInput.value = '';
                fileNameSpan.textContent = 'No file selected';
                previewArea.style.display = 'none';
                previewImg.src = '';
                previewName.textContent = '';
            }

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    showToast('Only image files allowed', 'error');
                    resetFilePreview();
                    return;
                }

                if (file.size > 5 * 1024 * 1024) {
                    showToast('Max 5MB allowed', 'error');
                    resetFilePreview();
                    return;
                }

                fileNameSpan.textContent = file.name;
                previewName.textContent = file.name;
                const url = URL.createObjectURL(file);
                previewImg.src = url;
                previewArea.style.display = 'flex';
            });

            clearPhotoBtn.addEventListener('click', resetFilePreview);

            function fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const base64 = reader.result.split(',')[1];
                        resolve({
                            name: file.name,
                            type: file.type,
                            data: base64
                        });
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            async function submitForm(data) {
                if (data.file) {
                    data.file = JSON.stringify(data.file);
                }
                const body = new URLSearchParams(data).toString();
                return fetch(scriptURL, {
                    method: 'POST',
                    mode: 'cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
                    body
                });
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.classList.add('is-loading');

                try {
                    const data = {
                        fullName: form.fullName.value.trim(),
                        idNumber: form.idNumber.value.trim(),
                        mobile: form.mobile.value.trim(),
                        bloodGroup: form.bloodGroup.value,
                        additionalInfo: form.additionalInfo.value.trim()
                    };

                    if (!data.fullName || !data.idNumber || !data.mobile || !data.bloodGroup) {
                        throw new Error('Please fill all required fields');
                    }

                    if (fileInput.files.length > 0) {
                        data.file = await fileToBase64(fileInput.files[0]);
                    }

                    const response = await submitForm(data);
                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Server error (${response.status})`);
                    }

                    const result = await response.json();
                    if (result && result.status === 'success') {
                        showToast('Registration successful! Thank you for volunteering.', 'success');
                        form.reset();
                        resetFilePreview();
                    } else {
                        throw new Error(result?.message || 'Unexpected server response');
                    }
                } catch (err) {
                    console.error('Submission error:', err);
                    showToast(err.message, 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('is-loading');
                }
            });

            cancelBtn.addEventListener('click', () => {
                form.reset();
                resetFilePreview();
                showToast('Form cleared', 'info');
            });
        })();
    </script>
    <footer class="footer-pro">
        <div class="footer-content">
