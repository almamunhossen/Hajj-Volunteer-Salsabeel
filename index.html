<!DOCTYPE html>
<html lang="en">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hajj Volunteer Salsabeel 2026</title>
    <!-- Bulma CSS + Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div style="position: absolute; top: 1rem; right: 1rem; z-index: 100;">
        <button id="themeToggleBtn" class="button is-light is-rounded" aria-label="Toggle Dark Mode">
            <span class="icon"><i class="fas fa-moon" id="themeIcon"></i></span>
        </button>
    </div>
    <section class="hero is-primary is-bold">
        <div class="hero-body">
            <div class="container has-text-centered-mobile">
                <div class="hero-logo">
                    <img src="images/Volunteer-logo.png" alt="Volunteer logo" onerror="this.style.display='none'">
                </div>
                <h1 class="title is-2">Volunteer Registration</h1>
                <p class="subtitle is-5">Hajj Volunteer Salsabeel 2026</p>
            </div>
        </div>
    </section>

    <div class="container mb-6">
        <div class="card-form">
            <form id="volunteerForm" novalidate>
                <div class="columns is-multiline">
                    <!-- Full name -->
                    <div class="column is-6 field">
                        <label class="label required-star">Full Name</label>
                        <div class="control has-icons-left">
                            <input class="input" type="text" name="fullName" placeholder="e.g., Al Mamun Hossen"
                                required autocomplete="name">
                            <span class="icon is-small is-left"><i class="fas fa-user"></i></span>
                        </div>
                    </div>

                    <!-- ID number -->
                    <div class="column is-6 field">
                        <label class="label required-star">ID Number</label>
                        <div class="control has-icons-left">
                            <input class="input" type="text" name="idNumber" placeholder="10-digit ID" required
                                pattern="\d{10}" title="Must be exactly 10 digits" maxlength="10">
                            <span class="icon is-small is-left"><i class="fas fa-id-card"></i></span>
                        </div>
                    </div>

                    <!-- Mobile -->
                    <div class="column is-6 field">
                        <label class="label required-star">Mobile Number</label>
                        <div class="control has-icons-left">
                            <input class="input" type="tel" name="mobile" placeholder="+966 5X XXX XXXX" required
                                pattern="[+0-9\s\-\(\)]{8,20}" title="Valid phone number">
                            <span class="icon is-small is-left"><i class="fas fa-phone"></i></span>
                        </div>
                        <p class="help">Include country code</p>
                    </div>

                    <!-- Blood group -->
                    <div class="column is-6 field">
                        <label class="label required-star">Blood Group</label>
                        <div class="control has-icons-left">
                            <div class="select is-fullwidth">
                                <select name="bloodGroup" required>
                                    <option value="" disabled selected>– Select blood type –</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                </select>
                            </div>
                            <span class="icon is-small is-left"><i class="fas fa-tint"></i></span>
                        </div>
                    </div>
                </div>

                <!-- Profile photo (optional) -->
                <div class="field mt-2">
                    <label class="label">Profile Photo</label>
                    <div class="control">
                        <div class="file has-name is-fullwidth">
                            <label class="file-label">
                                <input class="file-input" type="file" name="theFile" id="profilePhoto"
                                    accept="image/jpeg, image/png, image/jpg, image/webp" required>
                                <span class="file-cta">
                                    <span class="file-icon"><i class="fas fa-camera"></i></span>
                                    <span class="file-label">Choose a photo…</span>
                                </span>
                                <span class="file-name" id="fileNameDisplay">No file selected</span>
                            </label>
                        </div>
                    </div>
                    <div id="previewArea" class="preview-container" style="display: none;">
                        <img id="previewImg" class="image-preview" alt="Preview">
                        <div>
                            <p class="is-size-7 has-text-weight-semibold mb-2" id="previewName">filename.jpg</p>
                            <button type="button" id="clearPhotoBtn" class="button is-small is-light"><i
                                    class="fas fa-times mr-1"></i> Remove</button>
                        </div>
                    </div>
                    <p class="help">JPEG, PNG, WEBP (max 5MB)</p>
                </div>

                <!-- Additional information -->
                <div class="field mt-4">
                    <label class="label">Additional Information <span
                            class="has-text-grey-light">(Optional)</span></label>
                    <div class="control has-icons-left">
                        <textarea class="textarea" name="additionalInfo" rows="3"
                            placeholder="Medical conditions, availability, previous donation experience..."
                            style="padding-left: 3.2rem;"></textarea>
                        <span class="icon is-small is-left"
                            style="height: 3.2rem; display: flex; align-items: center; justify-content: center;"><i
                                class="fas fa-comment-dots"></i></span>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="field is-grouped is-grouped-right mt-6 pt-4"
                    style="border-top: 1px solid var(--border-color);">
                    <div class="control">
                        <button class="button is-light" type="button" id="cancelBtn">
                            <span class="icon"><i class="fas fa-undo-alt"></i></span>
                            <span>Clear</span>
                        </button>
                    </div>
                    <div class="control">
                        <button class="button is-primary" type="submit" id="submitBtn">
                            <span class="icon"><i class="fas fa-paper-plane"></i></span>
                            <span>Register Now</span>
                        </button>
                    </div>
                </div>
            </form>
            <p class="help is-danger mt-4 has-text-centered">* Required fields must be completed before submitting.</p>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
    <footer class="footer-pro">
        <div class="footer-content">
            <p>&copy; 2026 Hajj Volunteer Salsabeel. All rights reserved.</p>
            <p>Developed with <span class="footer-heart"><i class="fas fa-heart"></i></span> by <a
                    href="https://www.almamunhossen.com" target="_blank" rel="noopener noreferrer">Al Mamun Hossen</a>
            </p>
        </div>
    </footer>
</body>

</html>
